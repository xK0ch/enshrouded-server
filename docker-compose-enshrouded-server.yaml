services:
  enshrouded:
    image: mornedhels/enshrouded-server:latest
    container_name: enshrouded-server
    hostname: enshrouded-server
    restart: unless-stopped
    stop_grace_period: 90s
    tty: true
    stdin_open: true
    ports:
      - "15637:15637/udp"
    environment:
      SERVER_NAME: "MLTSF"
      SERVER_PASSWORD: ${SERVER_PASSWORD}
      SERVER_SLOT_COUNT: "16"
      SERVER_GAMEPORT: "15636"
      SERVER_QUERYPORT: "15637"
      SERVER_IP: "0.0.0.0"
      BACKUP_CRON: "*/15 * * * *"
      BACKUP_MAX_COUNT: "10"
      UPDATE_CRON: "*/30 * * * *"
      RESTART_CRON: "0 3 * * *"
      PUID: "4711"
      PGID: "4711"
      TZ: "Europe/Berlin"
    volumes:
      - /home/fkoch/enshrouded:/opt/enshrouded
